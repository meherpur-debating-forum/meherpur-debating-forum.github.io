<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEHERPUR DEBATING FORUM | Under Construction</title>
  <meta name="description" content="Official website of Meherpur Debating Forum is currently under construction." />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="icon.jpg" />
  <link rel="shortcut icon" href="icon.jpg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #03050a;
      --gold: #D4A937;
      --gold-light: #fce18a;
      --gold-glow: rgba(212, 169, 55, 0.4);
      --text-main: #ffffff;
      --text-muted: #8ba3b8;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: var(--bg-color);
      font-family: 'Manrope', sans-serif;
      overflow: hidden; /* No scrolling needed for this single screen */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── BACKGROUND CANVAS ── */
    #bg-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── MAIN CONTENT (HERO) ── */
    .content-wrapper {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: -10vh; /* Shift slightly up to leave room for construction scene */
      padding: 0 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(212, 169, 55, 0.1);
      border: 1px solid rgba(212, 169, 55, 0.3);
      padding: 8px 20px;
      border-radius: 50px;
      color: var(--gold-light);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(212, 169, 55, 0.15);
      animation: fadeInDown 1s ease-out;
    }

    .badge .dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--gold);
      animation: pulseDot 1.5s infinite;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      color: var(--text-main);
      letter-spacing: 0.05em;
      line-height: 1.1;
      margin-bottom: 15px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      animation: fadeInUp 1s ease-out 0.2s backwards;
    }

    .subtitle {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: var(--gold);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeInUp 1s ease-out 0.4s backwards;
    }

    .subtitle span {
      color: var(--text-muted);
    }

    /* ── CONSTRUCTION SCENE CONTAINER ── */
    .scene-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50vh; /* Takes up bottom half of the screen */
      z-index: 5;
      pointer-events: none;
    }

    #construction-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── ANIMATIONS ── */
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Ambient Background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Hero Content -->
  <div class="content-wrapper">
    <div class="badge">
      <div class="dot"></div>
      Site Under Construction
    </div>
    <h1 class="title">MEHERPUR DEBATING<br>FORUM</h1>
    <h2 class="subtitle">Something extraordinary <span>is being built</span></h2>
  </div>

  <!-- Epic Construction Animation -->
  <div class="scene-container">
    <canvas id="construction-canvas"></canvas>
  </div>

<script>
/** * 1. AMBIENT BACKGROUND SYSTEM (Grid, Fog, Floating Dust)
 */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  
  function createParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -Math.random() * 0.5 - 0.2,
      alpha: Math.random() * 0.5 + 0.1
    };
  }

  function init() {
    resize();
    particles = Array.from({length: 100}, createParticle);
  }

  let time = 0;
  function animate() {
    ctx.clearRect(0, 0, W, H);

    // Dynamic Grid Background
    const gridSize = 80;
    const offset = (time * 0.2) % gridSize;
    ctx.strokeStyle = 'rgba(212, 169, 55, 0.03)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = offset - gridSize; x < W; x += gridSize) {
      ctx.moveTo(x, 0); ctx.lineTo(x, H);
    }
    for (let y = offset - gridSize; y < H; y += gridSize) {
      ctx.moveTo(0, y); ctx.lineTo(W, y);
    }
    ctx.stroke();

    // Soft Center Glow
    const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.6);
    gradient.addColorStop(0, 'rgba(212, 169, 55, 0.05)');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Floating Dust Particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212, 169, 55, ${p.alpha})`;
      ctx.fill();
    });

    time++;
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', init);
  init();
  animate();
})();


/**
 * 2. SUPER GIANT BOSS LEVEL CONSTRUCTION ANIMATION
 * Features: Multi-layered parallax, fluid physics, particle systems (sparks, smoke)
 */
(function() {
  const canvas = document.getElementById('construction-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  let frame = 0;

  // Particle Systems
  let sparks = [];
  let smokes = [];

  function resize() {
    W = canvas.width = canvas.parentElement.clientWidth;
    H = canvas.height = canvas.parentElement.clientHeight;
  }

  window.addEventListener('resize', resize);
  resize();

  function spawnSparks(x, y, count) {
    for(let i=0; i<count; i++) {
      sparks.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 8 - 2,
        life: 1,
        color: Math.random() > 0.3 ? '#fce18a' : '#ffffff'
      });
    }
  }

  function spawnSmoke(x, y) {
    smokes.push({
      x: x, y: y,
      vx: -Math.random() * 1 - 0.5,
      vy: -Math.random() * 2 - 1,
      size: Math.random() * 5 + 5,
      life: 1
    });
  }

  function drawScene() {
    ctx.clearRect(0, 0, W, H);
    const groundY = H * 0.85;
    
    // Smooth scaling for responsiveness
    const scale = Math.min(W / 1200, 1.2); 

    // --- LAYER 1: Background Cityscape Silhouette ---
    ctx.fillStyle = 'rgba(212, 169, 55, 0.05)';
    ctx.beginPath();
    ctx.rect(0, groundY, W, H - groundY);
    ctx.fill();
    
    // Distant background cranes
    ctx.strokeStyle = 'rgba(212, 169, 55, 0.1)';
    ctx.lineWidth = 2;
    const bgCranes = [W*0.15, W*0.85];
    bgCranes.forEach(bx => {
        ctx.beginPath(); ctx.moveTo(bx, groundY); ctx.lineTo(bx, groundY - 200*scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx, groundY - 200*scale); ctx.lineTo(bx + 80*scale, groundY - 200*scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx, groundY - 200*scale); ctx.lineTo(bx - 30*scale, groundY - 180*scale); ctx.stroke();
    });

    // --- LAYER 2: Main Building Skeleton ---
    const bldX = W * 0.5 - (150 * scale);
    const bldW = 300 * scale;
    const floorH = 40 * scale;
    const floors = 5;

    ctx.lineWidth = 3 * scale;
    
    for(let i=0; i<floors; i++) {
        let fy = groundY - (i+1)*floorH;
        let alpha = 1 - (i * 0.15); // fade as it goes up
        
        ctx.strokeStyle = `rgba(212, 169, 55, ${alpha})`;
        
        // Horizontal beams
        ctx.beginPath(); ctx.moveTo(bldX, fy); ctx.lineTo(bldX + bldW, fy); ctx.stroke();
        
        // Vertical columns
        const cols = 5;
        for(let c=0; c<cols; c++) {
            let cx = bldX + (bldW / (cols-1)) * c;
            ctx.beginPath(); ctx.moveTo(cx, fy); ctx.lineTo(cx, fy + floorH); ctx.stroke();
            
            // Cross bracing
            if(i < 3 && c < cols-1) {
                ctx.strokeStyle = `rgba(212, 169, 55, ${alpha * 0.4})`;
                ctx.lineWidth = 1.5 * scale;
                let nx = bldX + (bldW / (cols-1)) * (c+1);
                ctx.beginPath(); ctx.moveTo(cx, fy); ctx.lineTo(nx, fy + floorH); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(nx, fy); ctx.lineTo(cx, fy + floorH); ctx.stroke();
                ctx.lineWidth = 3 * scale;
                ctx.strokeStyle = `rgba(212, 169, 55, ${alpha})`;
            }
        }

        // Blueprint glowing effect on top unfinished floor
        if (i === floors - 1 || i === floors - 2) {
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = `rgba(59, 130, 246, ${Math.sin(frame*0.05)*0.3 + 0.5})`; // Blue glow
            ctx.strokeRect(bldX + 10, fy + 10, bldW - 20, floorH - 20);
            ctx.setLineDash([]);
        }
    }

    // Dynamic Welding Sparks on building
    if(frame % 15 === 0) {
        let wx = bldX + Math.random() * bldW;
        let wy = groundY - (Math.floor(Math.random() * 3) + 2) * floorH;
        spawnSparks(wx, wy, 15);
    }


    // --- LAYER 3: The Heavy Crane ---
    const craneX = W * 0.75;
    const craneH = 320 * scale;
    const craneTopY = groundY - craneH;
    
    // Tower
    ctx.fillStyle = '#111';
    ctx.fillRect(craneX - 10*scale, craneTopY, 20*scale, craneH);
    ctx.strokeStyle = '#D4A937';
    ctx.lineWidth = 3 * scale;
    ctx.strokeRect(craneX - 10*scale, craneTopY, 20*scale, craneH);
    
    // Tower X Bracing
    ctx.lineWidth = 1.5 * scale;
    for(let y = groundY; y > craneTopY; y -= 20*scale) {
        ctx.beginPath(); ctx.moveTo(craneX - 10*scale, y); ctx.lineTo(craneX + 10*scale, y - 20*scale); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(craneX + 10*scale, y); ctx.lineTo(craneX - 10*scale, y - 20*scale); ctx.stroke();
    }

    // Crane Arm (Swinging slightly)
    const armAngle = Math.sin(frame * 0.01) * 0.05;
    ctx.save();
    ctx.translate(craneX, craneTopY);
    ctx.rotate(armAngle);
    
    // Back arm (Counterweight)
    ctx.fillStyle = '#222';
    ctx.fillRect(-80*scale, -10*scale, 80*scale, 20*scale);
    ctx.strokeStyle = '#D4A937';
    ctx.strokeRect(-80*scale, -10*scale, 80*scale, 20*scale);
    
    // Main Jib Arm
    ctx.fillStyle = '#111';
    ctx.fillRect(0, -5*scale, 280*scale, 10*scale);
    ctx.strokeStyle = '#D4A937';
    ctx.lineWidth = 2 * scale;
    ctx.strokeRect(0, -5*scale, 280*scale, 10*scale);
    
    // Tension Cables
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, -40*scale); ctx.lineTo(-70*scale, -10*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -40*scale); ctx.lineTo(150*scale, -5*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -40*scale); ctx.lineTo(260*scale, -5*scale); ctx.stroke();
    
    // Swinging Load (Physics simulation approximation)
    const loadX = 220 * scale;
    const ropeSwing = Math.sin(frame * 0.02) * 0.1;
    ctx.translate(loadX, 5*scale);
    ctx.rotate(ropeSwing);
    
    // Rope
    const ropeLen = 120 * scale + Math.sin(frame*0.01)*20*scale; // Moving up and down
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1.5 * scale;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, ropeLen); ctx.stroke();
    
    // Steel Beam Load
    ctx.fillStyle = '#D4A937';
    ctx.shadowColor = '#D4A937';
    ctx.shadowBlur = 10;
    ctx.fillRect(-40*scale, ropeLen, 80*scale, 12*scale);
    ctx.shadowBlur = 0; // Reset
    
    // Hook
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2 * scale;
    ctx.beginPath(); ctx.arc(0, ropeLen - 5*scale, 5*scale, 0, Math.PI); ctx.stroke();

    ctx.restore(); // Restore from crane arm rotation


    // --- LAYER 4: The Moving Bulldozer ---
    const bdSpeed = 1.5 * scale;
    const bdX = ((frame * bdSpeed) % (W + 300)) - 150;
    
    ctx.save();
    ctx.translate(bdX, groundY);

    // Track System
    const trackW = 70 * scale, trackH = 20 * scale;
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath(); ctx.roundRect(-trackW/2, -trackH, trackW, trackH, trackH/2); ctx.fill();
    ctx.strokeStyle = '#D4A937';
    ctx.lineWidth = 2 * scale;
    ctx.stroke();
    
    // Wheels spinning
    const wheelRot = (frame * 0.1) % (Math.PI * 2);
    ctx.fillStyle = '#333';
    [-20, 0, 20].forEach(wx => {
        ctx.save();
        ctx.translate(wx * scale, -trackH/2);
        ctx.rotate(wheelRot);
        ctx.beginPath(); ctx.arc(0, 0, 6*scale, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#D4A937';
        ctx.beginPath(); ctx.moveTo(-6*scale, 0); ctx.lineTo(6*scale, 0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -6*scale); ctx.lineTo(0, 6*scale); ctx.stroke();
        ctx.restore();
    });

    // Body
    ctx.fillStyle = '#1e2532'; // Dark metal
    ctx.beginPath(); ctx.roundRect(-30*scale, -45*scale, 55*scale, 25*scale, 4*scale); ctx.fill();
    ctx.strokeStyle = '#3B82F6'; // Blue accent
    ctx.stroke();

    // Cabin
    ctx.fillStyle = '#11151f';
    ctx.beginPath(); ctx.roundRect(-10*scale, -70*scale, 30*scale, 25*scale, 4*scale); ctx.fill();
    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; // Glass
    ctx.fillRect(-5*scale, -65*scale, 20*scale, 15*scale);
    
    // Blade
    ctx.fillStyle = '#D4A937';
    const bladeAngle = Math.sin(frame * 0.1) * 0.1; // Shaking blade
    ctx.save();
    ctx.translate(35*scale, -10*scale);
    ctx.rotate(bladeAngle);
    ctx.beginPath(); 
    ctx.moveTo(-10*scale, -20*scale);
    ctx.lineTo(5*scale, -25*scale);
    ctx.lineTo(10*scale, 10*scale);
    ctx.lineTo(-5*scale, 10*scale);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Exhaust Pipe & Smoke
    ctx.fillStyle = '#555';
    ctx.fillRect(-25*scale, -60*scale, 4*scale, 15*scale);
    
    if(frame % 4 === 0) {
        spawnSmoke(bdX - 23*scale, groundY - 60*scale);
    }
    
    ctx.restore();

    // --- Ground Line Enhancement ---
    ctx.strokeStyle = '#D4A937';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
    // Ground Grid perspective
    ctx.strokeStyle = 'rgba(212, 169, 55, 0.1)';
    for(let i=1; i<5; i++) {
        let y = groundY + i * 15 * scale;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }


    // --- RENDER PARTICLES ---
    
    // Smoke
    for(let i=smokes.length-1; i>=0; i--) {
        let s = smokes[i];
        s.x += s.vx; s.y += s.vy;
        s.size += 0.2;
        s.life -= 0.015;
        
        if(s.life <= 0) { smokes.splice(i, 1); continue; }
        
        ctx.fillStyle = `rgba(100, 110, 120, ${s.life * 0.3})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    }

    // Sparks
    ctx.globalCompositeOperation = 'lighter'; // Makes sparks glow
    for(let i=sparks.length-1; i>=0; i--) {
        let s = sparks[i];
        s.x += s.vx; s.y += s.vy; s.vy += 0.3; // gravity
        s.life -= 0.03;
        
        if(s.life <= 0) { sparks.splice(i, 1); continue; }
        
        ctx.fillStyle = s.color;
        ctx.globalAlpha = s.life;
        ctx.beginPath(); ctx.arc(s.x, s.y, 1.5 * scale, 0, Math.PI*2); ctx.fill();
        
        // Glow trail
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx*2, s.y - s.vy*2);
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    frame++;
    requestAnimationFrame(drawScene);
  }

  drawScene();
})();
</script>
</body>
</html>
