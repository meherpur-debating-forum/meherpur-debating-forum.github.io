<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" 
     viewBox="0 0 1280 720" width="100%" height="100%" 
     role="img" style="background-color: #030305; font-family: sans-serif;">

    <title>MDF | Elite Debating Forum Cinematic Reveal</title>
    <desc>Ultra-premium SVG loading animation featuring the MDF logo with dynamic trace reveals, true vector masking for the debater silhouettes, glowing particles, and HUD ring elements.</desc>

    <defs>
        <!-- ========================================== -->
        <!-- 1. GRADIENTS                               -->
        <!-- ========================================== -->
        
        <!-- Deep Cinematic Vignette Background -->
        <radialGradient id="bgVignette" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#14110A" />
            <stop offset="40%" stop-color="#080705" />
            <stop offset="100%" stop-color="#030305" />
        </radialGradient>

        <!-- Ambient Center Glow -->
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.25" />
            <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
        </radialGradient>

        <!-- Ultra Premium Gold Gradient (Base Fill) -->
        <linearGradient id="goldBase" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8A6519" />
            <stop offset="25%" stop-color="#E6C762" />
            <stop offset="50%" stop-color="#FFF2A8" />
            <stop offset="75%" stop-color="#D4AF37" />
            <stop offset="100%" stop-color="#B38B22" />
        </linearGradient>

        <!-- Darker Gold for 3D/Contrast Depth -->
        <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FCE181" />
            <stop offset="60%" stop-color="#C29421" />
            <stop offset="100%" stop-color="#6B4B0C" />
        </linearGradient>

        <!-- Sheen Sweep Gradient -->
        <linearGradient id="sheenSweep" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="white" stop-opacity="0" />
            <stop offset="45%" stop-color="#FFF2A8" stop-opacity="0" />
            <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.8" />
            <stop offset="55%" stop-color="#FFF2A8" stop-opacity="0" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
            <animateTransform attributeName="gradientTransform" type="translate" 
                              values="-1 0; 2 0; -1 0" dur="12s" repeatCount="indefinite" />
        </linearGradient>

        <!-- ========================================== -->
        <!-- 2. FILTERS                                 -->
        <!-- ========================================== -->
        
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="16" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="particleGlow">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- ========================================== -->
        <!-- 3. TRUE VECTOR MASKS                       -->
        <!-- ========================================== -->
        <!-- This mask perfectly punches out the debaters and mic grills -->
        <!-- White = Visible logo, Black = Transparent cutouts -->
        <mask id="mdfCutoutMask">
            <!-- Show Everything Base -->
            <rect x="-500" y="-500" width="3000" height="3000" fill="white" />
            
            <!-- Hide Debater 1 (Inside 'M') -->
            <g transform="translate(10, 0)" fill="black" stroke="black">
                <polygon points="230,400 255,400 248,340 238,340" />
                <polygon points="225,340 265,330 270,335 235,345" />
                <circle cx="210" cy="300" r="14" />
                <path d="M 195,400 L 210,335 Q 220,315 238,330 L 245,340 L 225,345 Q 215,340 215,355 L 210,400 Z" />
                <path d="M 215,325 Q 235,325 250,335" fill="none" stroke-width="4" stroke-linecap="round"/>
                <path d="M 260,330 L 250,310" fill="none" stroke-width="2.5"/>
                <circle cx="248" cy="308" r="4.5" />
            </g>

            <!-- Hide Debater 2 (Inside 'F') -->
            <g transform="translate(-10, 0)" fill="black" stroke="black">
                <polygon points="790,400 765,400 772,340 782,340" />
                <polygon points="795,340 755,330 750,335 785,345" />
                <circle cx="810" cy="300" r="14" />
                <path d="M 825,400 L 810,335 Q 800,315 782,330 L 775,340 L 795,345 Q 805,340 805,355 L 810,400 Z" />
                <path d="M 805,325 Q 785,325 770,335" fill="none" stroke-width="4" stroke-linecap="round"/>
                <path d="M 760,330 L 770,310" fill="none" stroke-width="2.5"/>
                <circle cx="772" cy="308" r="4.5" />
            </g>

            <!-- Hide Microphone Grilles -->
            <g stroke="black" stroke-width="4">
                <line x1="544" y1="235" x2="596" y2="235" />
                <line x1="544" y1="247" x2="596" y2="247" />
                <line x1="544" y1="259" x2="596" y2="259" />
                <line x1="544" y1="271" x2="596" y2="271" />
            </g>
            <circle cx="535" cy="260" r="5" fill="black" />
            <circle cx="605" cy="260" r="5" fill="black" />
        </mask>

        <!-- ========================================== -->
        <!-- 4. LOGO PATH DEFINITIONS                   -->
        <!-- ========================================== -->
        <g id="mdf-base-paths">
            <!-- M -->
            <path d="M 200 400 L 260 400 L 260 250 L 320 340 L 380 250 L 380 400 L 440 400 L 440 180 L 360 180 L 320 250 L 280 180 L 200 180 Z" />
            <!-- D -->
            <path d="M 460 400 L 540 400 C 640 400 680 340 680 290 C 680 240 640 180 540 180 L 460 180 Z M 510 220 L 540 220 C 600 220 630 250 630 290 C 630 330 600 360 540 360 L 510 360 Z" fill-rule="evenodd" />
            <!-- F -->
            <path d="M 700 400 L 750 400 L 750 310 L 820 310 L 820 270 L 750 270 L 750 220 L 830 220 L 830 180 L 700 180 Z" />
            <!-- Arch & Swoosh Elements -->
            <path d="M 140 420 C 140 220 300 80 850 130 C 500 70 250 150 190 420 Z" />
            <circle cx="260" cy="115" r="24" />
            <path d="M 320 90 A 8 8 0 0 1 336 90 L 336 105 A 8 8 0 0 1 320 105 Z" />
            <path d="M 315 100 A 13 13 0 0 0 341 100" stroke-width="3" fill="none"/>
            <line x1="328" y1="113" x2="328" y2="125" stroke-width="3" />
            <!-- Inner D Mic Element -->
            <path d="M 545 220 A 25 25 0 0 1 595 220 L 595 280 A 25 25 0 0 1 545 280 Z" />
            <path d="M 535 260 A 35 35 0 0 0 605 260" stroke-width="6" fill="none" stroke-linecap="round"/>
            <line x1="570" y1="295" x2="570" y2="360" stroke-width="8" />
            <path d="M 545 360 L 595 360 L 600 380 L 540 380 Z" />
        </g>
    </defs>

    <!-- ====================================================================== -->
    <!-- SCENE RENDERING BEGINS                                                 -->
    <!-- ====================================================================== -->

    <!-- Base Background Layer -->
    <rect width="100%" height="100%" fill="url(#bgVignette)" />

    <!-- Ambient Center Glow (Breathing) -->
    <circle cx="640" cy="360" r="450" fill="url(#centerGlow)" filter="url(#intenseGlow)">
        <animate attributeName="r" values="350; 500; 350" dur="8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="6s" repeatCount="indefinite" />
    </circle>

    <!-- ========================================== -->
    <!-- LAYER 1: AMBIENT PARTICLES & HUD RINGS     -->
    <!-- ========================================== -->
    <g id="background-elements">
        <!-- Global Fade In for Environment -->
        <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.15; 0.9; 1" dur="12s" repeatCount="indefinite" />

        <!-- Rotating Elite HUD Rings -->
        <g stroke="url(#goldBase)" fill="none" transform-origin="640 360" opacity="0.3">
            <circle cx="640" cy="360" r="380" stroke-width="0.5" stroke-dasharray="2 12 60 12">
                <animateTransform attributeName="transform" type="rotate" from="0 640 360" to="360 640 360" dur="40s" repeatCount="indefinite" />
            </circle>
            <circle cx="640" cy="360" r="365" stroke-width="1.5" stroke-dasharray="150 30 10 30" stroke="url(#goldDark)">
                <animateTransform attributeName="transform" type="rotate" from="360 640 360" to="0 640 360" dur="25s" repeatCount="indefinite" />
            </circle>
        </g>

        <!-- Ambient Floating Particle Dust -->
        <g filter="url(#particleGlow)" fill="#FFF2A8">
            <circle cx="200" cy="600" r="1.5"><animateTransform attributeName="transform" type="translate" values="0 0; 40 -150" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.6; 0" dur="6s" repeatCount="indefinite"/></circle>
            <circle cx="450" cy="680" r="2.5"><animateTransform attributeName="transform" type="translate" values="0 0; -20 -200" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.8; 0" dur="8s" repeatCount="indefinite"/></circle>
            <circle cx="800" cy="550" r="1.0"><animateTransform attributeName="transform" type="translate" values="0 0; -30 -100" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.5; 0" dur="5s" repeatCount="indefinite"/></circle>
            <circle cx="1050" cy="400" r="2.0"><animateTransform attributeName="transform" type="translate" values="0 0; 50 -180" dur="7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.7; 0" dur="7s" repeatCount="indefinite"/></circle>
            <circle cx="350" cy="300" r="1.2"><animateTransform attributeName="transform" type="translate" values="0 0; -10 -120" dur="4.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.6; 0" dur="4.5s" repeatCount="indefinite"/></circle>
            <circle cx="950" cy="200" r="1.8"><animateTransform attributeName="transform" type="translate" values="0 0; 25 -140" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.9; 0" dur="9s" repeatCount="indefinite"/></circle>
            <circle cx="640" cy="450" r="2.5"><animateTransform attributeName="transform" type="translate" values="0 0; 0 -250" dur="10s" repeatCount="indefinite"/><animate attributeName="opacity" values="0; 0.4; 0" dur="10s" repeatCount="indefinite"/></circle>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- LAYER 2: MASTER LOGO GROUP                 -->
    <!-- ========================================== -->
    <!-- 
        Transforms: Center the 710x340 logo block onto the 1280x720 canvas
        Calculated as: Translate (1280 - (710*1.15))/2 = 231, (720 - (340*1.15))/2 = 164
    -->
    <g id="master-logo-scale" transform-origin="640 360">
        <!-- Cinematic Push-in scale animation -->
        <animateTransform attributeName="transform" type="scale" values="0.9; 1.05; 1.05" keyTimes="0; 0.8; 1" dur="12s" repeatCount="indefinite" />

        <!-- Position Wrapper applying the Cutout Mask -->
        <g transform="translate(180, 120) scale(1.15)" mask="url(#mdfCutoutMask)">
            
            <!-- PHASE 1: TRACE REVEAL (0s to 4s) -->
            <g id="trace-lines" fill="none" stroke="url(#goldBase)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Fade out trace when fill comes in -->
                <animate attributeName="opacity" values="0; 1; 1; 0; 0" keyTimes="0; 0.1; 0.35; 0.45; 1" dur="12s" repeatCount="indefinite" />
                
                <use href="#mdf-base-paths" stroke-dasharray="2500" stroke-dashoffset="2500" filter="url(#softGlow)">
                    <animate attributeName="stroke-dashoffset" values="2500; 0; 0; 2500" keyTimes="0; 0.3; 0.9; 1" dur="12s" repeatCount="indefinite" />
                </use>
            </g>

            <!-- PHASE 2: GOLD FILL REVEAL (3s to 11s) -->
            <g id="logo-fill">
                <!-- Fade in Fill gracefully -->
                <animate attributeName="opacity" values="0; 0; 0; 1; 1; 0" keyTimes="0; 0.25; 0.35; 0.45; 0.9; 1" dur="12s" repeatCount="indefinite" />
                
                <!-- The Core Golden Logo -->
                <use href="#mdf-base-paths" fill="url(#goldBase)" stroke="url(#goldDark)" stroke-width="0.5" filter="url(#softGlow)" />
                
                <!-- Overlay: Ambient Gradient for 3D Lighting -->
                <use href="#mdf-base-paths" fill="url(#goldDark)" opacity="0.4" style="mix-blend-mode: multiply;" />

                <!-- PHASE 3: LUXURY SHEEN SWEEP (5s to 9s) -->
                <!-- Because it's inside the masked group, the sheen perfectly respects debater cutouts! -->
                <g opacity="0">
                    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.45; 0.5; 0.8; 0.85; 1" dur="12s" repeatCount="indefinite" />
                    <!-- Diagonal Light Beam Rect -->
                    <rect x="-200" y="-100" width="1200" height="800" fill="url(#sheenSweep)" transform="skewX(-25)" />
                </g>
            </g>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- LAYER 3: CINEMATIC SOUNDWAVES (4s to 8s)   -->
    <!-- ========================================== -->
    <g id="pulse-soundwaves" fill="none" stroke="#D4AF37" stroke-linecap="round">
        <animate attributeName="opacity" values="0; 0; 0; 0.8; 0.2; 0; 0" keyTimes="0; 0.3; 0.35; 0.4; 0.7; 0.8; 1" dur="12s" repeatCount="indefinite" />
        
        <!-- Waves emitting from the microphone (Approx right side of logo) -->
        <g transform="translate(860, 420)" filter="url(#softGlow)">
            <!-- Wave 1 (Inner) -->
            <path d="M 0 -30 Q 30 0 0 30" stroke-width="3" opacity="0.9">
                <animate attributeName="d" values="M 0 -30 Q 30 0 0 30; M 0 -30 Q 45 0 0 30; M 0 -30 Q 30 0 0 30" dur="2s" repeatCount="indefinite" />
            </path>
            
            <!-- Wave 2 (Middle) -->
            <path d="M 15 -50 Q 60 0 15 50" stroke-width="2" opacity="0.6">
                <animate attributeName="d" values="M 15 -50 Q 60 0 15 50; M 15 -50 Q 80 0 15 50; M 15 -50 Q 60 0 15 50" dur="2s" begin="0.3s" repeatCount="indefinite" />
            </path>

            <!-- Wave 3 (Outer) -->
            <path d="M 30 -70 Q 90 0 30 70" stroke-width="1" opacity="0.3">
                <animate attributeName="d" values="M 30 -70 Q 90 0 30 70; M 30 -70 Q 115 0 30 70; M 30 -70 Q 90 0 30 70" dur="2s" begin="0.6s" repeatCount="indefinite" />
            </path>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- LAYER 4: BOTTOM PRESTIGE ANCHOR            -->
    <!-- ========================================== -->
    <!-- A minimal glowing line to ground the logo like high-end esports banners -->
    <g id="prestige-line">
        <animate attributeName="opacity" values="0; 0; 0; 0; 0.6; 1; 0.8; 0" keyTimes="0; 0.4; 0.45; 0.5; 0.55; 0.7; 0.9; 1" dur="12s" repeatCount="indefinite" />
        
        <!-- Expanding Line -->
        <line x1="640" y1="580" x2="640" y2="580" stroke="url(#goldBase)" stroke-width="1.5" filter="url(#softGlow)">
            <animate attributeName="x1" values="640; 400; 400; 640" keyTimes="0; 0.5; 0.9; 1" dur="12s" repeatCount="indefinite" />
            <animate attributeName="x2" values="640; 880; 880; 640" keyTimes="0; 0.5; 0.9; 1" dur="12s" repeatCount="indefinite" />
        </line>
        
        <!-- Tiny anchor dots at the center -->
        <circle cx="630" cy="580" r="1.5" fill="#FFF2A8" />
        <circle cx="650" cy="580" r="1.5" fill="#FFF2A8" />
    </g>

    <!-- Global Fade Overlay to ensure perfect looping -->
    <rect width="100%" height="100%" fill="#030305" pointer-events="none">
        <animate attributeName="opacity" values="1; 0; 0; 0; 1" keyTimes="0; 0.08; 0.5; 0.92; 1" dur="12s" repeatCount="indefinite" />
    </rect>

</svg>